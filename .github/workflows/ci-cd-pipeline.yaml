name: Run pipeline and build Docker image

on:
  push:
    branches:
      - main  # or any other branch you want to monitor

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'  # specify the Python version

      - name: Install dependencies
        run: pip install -r loan_prediction/requirements.txt  # make sure you have a requirements.txt file in the loan_prediction folder

      - name: Run pipeline.py
        run: python loan_prediction/pipeline.py

  build-docker-image:
    needs: run-pipeline  # this ensures that this job runs only after 'run-pipeline' succeeds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Build Docker image
        run: docker build -t my-app:latest loan_prediction/

      - name: Commit and push changes
        run: |
          git config --global user.name "${{ secrets.GH_USERNAME }}"
          git config --global user.email "${{ secrets.GH_EMAIL }}"
          git commit -am "Automated commit message"
          git remote set-url origin https://${{ secrets.GH_USERNAME }}:${{ secrets.GH_PAT }}@github.com/${{ secrets.GH_USERNAME }}/loan-prediction.git
          git push origin HEAD:main
